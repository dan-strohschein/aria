name: Test Windows Build

on:
  workflow_dispatch:

env:
  ARIA_SOURCES: >-
    src/main.aria
    src/diagnostic/diagnostic.aria
    src/lexer/token.aria
    src/lexer/lexer.aria
    src/parser/ast.aria
    src/parser/parser.aria
    src/parser/precedence.aria
    src/resolver/scope.aria
    src/resolver/resolver.aria
    src/checker/types.aria
    src/checker/traits.aria
    src/checker/checker.aria
    src/codegen/ir.aria
    src/codegen/lower.aria
    src/codegen/llvm.aria
    src/codegen/codegen.aria

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout bootstrap compiler
        uses: actions/checkout@v4
        with:
          repository: dan-strohschein/aria-compiler-go
          path: aria-compiler-go

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install LLVM/clang
        run: choco install llvm -y

      - name: Verify clang
        shell: bash
        run: |
          export PATH="/c/Program Files/LLVM/bin:$PATH"
          clang --version

      - name: Build bootstrap compiler
        shell: bash
        run: |
          cd aria-compiler-go
          sed -i.bak 's/^go .*/go 1.23/' go.mod
          go build -o ../bootstrap-aria.exe ./cmd/aria

      - name: Bootstrap → Gen0
        shell: bash
        run: |
          export PATH="/c/Program Files/LLVM/bin:$PATH"
          ./bootstrap-aria.exe build ${{ env.ARIA_SOURCES }}
          echo "=== Looking for output binary ==="
          ls -la main* src/main* 2>/dev/null || true
          file main 2>/dev/null || true
          # The Go bootstrap names output 'main' — it's actually a Windows PE executable
          # Go's internal go build adds .exe, so the output should run as-is
          mv main main.exe 2>/dev/null || true
          echo "Gen0 ready"

      - name: Gen0 → Gen1 (self-compile)
        shell: bash
        timeout-minutes: 20
        run: |
          export PATH="/c/Program Files/LLVM/bin:$PATH"
          ./main.exe build ${{ env.ARIA_SOURCES }}
          echo "=== Looking for Gen1 ==="
          ls -la src/main* 2>/dev/null || true
          mv src/main src/main.exe 2>/dev/null || true
          cp src/main.exe gen1.exe 2>/dev/null || cp src/main gen1.exe 2>/dev/null || true
          ls -la gen1.exe
          echo "Gen1 built: $(wc -c < gen1.exe) bytes"

      - name: Smoke test Gen1
        shell: bash
        run: |
          export PATH="/c/Program Files/LLVM/bin:$PATH"
          printf 'mod test\nentry {\n    println("hello from aria")\n}\n' > smoke_test.aria
          cat smoke_test.aria
          echo "=== Building smoke test ==="
          ./gen1.exe build smoke_test.aria || echo "BUILD FAILED with exit $?"
          echo "=== Output files ==="
          ls -la smoke_test* 2>/dev/null || true
          mv smoke_test smoke_test.exe 2>/dev/null || true
          echo "=== Running ==="
          ./smoke_test.exe || echo "RUN FAILED with exit $?"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aria-windows-amd64
          path: gen1.exe
