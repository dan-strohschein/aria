name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.0). Leave empty to auto-increment patch.'
        required: false
        default: ''
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

env:
  # File order matters: diagnostic.aria must come before lexer.aria
  # to ensure correct struct field resolution (see _field_index_any)
  ARIA_SOURCES: >-
    src/main.aria
    src/diagnostic/diagnostic.aria
    src/lexer/token.aria
    src/lexer/lexer.aria
    src/parser/ast.aria
    src/parser/parser.aria
    src/parser/precedence.aria
    src/resolver/scope.aria
    src/resolver/resolver.aria
    src/checker/types.aria
    src/checker/traits.aria
    src/checker/checker.aria
    src/codegen/ir.aria
    src/codegen/lower.aria
    src/codegen/llvm.aria
    src/codegen/codegen.aria

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            label: darwin-arm64
          - os: macos-13
            label: darwin-amd64
          - os: ubuntu-latest
            label: linux-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout bootstrap compiler
        uses: actions/checkout@v4
        with:
          repository: dan-strohschein/aria-compiler-go
          path: aria-compiler-go
          token: ${{ secrets.BOOTSTRAP_PAT }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install clang (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Build bootstrap compiler
        run: |
          cd aria-compiler-go
          sed -i.bak 's/^go .*/go 1.23/' go.mod
          go build -o ../bootstrap-aria ./cmd/aria

      - name: Bootstrap → Gen0
        run: ./bootstrap-aria build ${{ env.ARIA_SOURCES }}

      - name: Gen0 → Gen1 (self-compile)
        run: ./main build ${{ env.ARIA_SOURCES }}

      - name: Gen1 → Gen2 (verify fixed point)
        run: |
          cp src/main gen1
          src/main build ${{ env.ARIA_SOURCES }}
          cp src/main gen2

          if cmp -s gen1 gen2; then
            echo "Fixed point reached: Gen1 == Gen2"
          else
            echo "WARNING: Gen1 and Gen2 differ ($(wc -c < gen1) vs $(wc -c < gen2) bytes)"
          fi

      - name: Run test suite
        run: ARIA_COMPILER=./gen2 bash testdata/programs/run_tests.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aria-${{ matrix.label }}
          path: gen2

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
            if [ -z "$LATEST" ]; then
              VERSION="0.1.0"
            else
              VER=${LATEST#v}
              MAJOR=$(echo $VER | cut -d. -f1)
              MINOR=$(echo $VER | cut -d. -f2)
              PATCH=$(echo $VER | cut -d. -f3 | cut -d- -f1)
              PATCH=$((PATCH + 1))
              VERSION="${MAJOR}.${MINOR}.${PATCH}"
            fi
          fi
          if [ "${{ github.event.inputs.prerelease }}" = "true" ]; then
            TAG="v${VERSION}-beta"
          else
            TAG="v${VERSION}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}, Tag: ${TAG}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release binaries
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          mkdir -p dist
          for dir in artifacts/aria-*; do
            label=$(basename "$dir" | sed 's/^aria-//')
            src="$dir/gen2"
            if [ -f "$src" ]; then
              dest="dist/aria-${TAG}-${label}"
              cp "$src" "$dest"
              chmod +x "$dest"
              echo "Prepared: $dest ($(wc -c < "$dest") bytes)"
            fi
          done
          cd dist && sha256sum aria-* > SHA256SUMS.txt && cat SHA256SUMS.txt

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

          PRERELEASE_FLAG=""
          if [ "${{ github.event.inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$TAG" \
            --title "Aria ${TAG}" \
            --notes "## Aria Compiler ${TAG}

          Self-hosting Aria compiler. Each binary was produced by the compiler compiling itself (Gen2, verified fixed point).

          ### Quick Start
          \`\`\`bash
          chmod +x aria-*
          sudo mv aria-* /usr/local/bin/aria
          aria build hello.aria && ./hello
          \`\`\`

          ### Requires
          - **clang** (macOS: xcode-select --install, Ubuntu: sudo apt install clang)

          ### Binaries
          | File | Platform |
          |------|----------|
          | aria-${TAG}-darwin-arm64 | macOS Apple Silicon |
          | aria-${TAG}-darwin-amd64 | macOS Intel |
          | aria-${TAG}-linux-amd64 | Linux x86_64 |" \
            $PRERELEASE_FLAG \
            dist/*
