name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 0.2.0). Leave empty to auto-increment patch from latest tag.'
        required: false
        default: ''
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout aria (self-hosting compiler)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout bootstrap compiler
        # Requires BOOTSTRAP_PAT secret (Personal Access Token with repo scope)
        # if aria-compiler-go is a private repository.
        # To create: GitHub Settings > Developer Settings > Personal Access Tokens > Generate
        # Then add as repo secret: aria repo > Settings > Secrets > Actions > BOOTSTRAP_PAT
        uses: actions/checkout@v4
        with:
          repository: dan-strohschein/aria-compiler-go
          path: aria-compiler-go
          token: ${{ secrets.BOOTSTRAP_PAT }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
            if [ -z "$LATEST" ]; then
              VERSION="0.1.0"
            else
              VER=${LATEST#v}
              MAJOR=$(echo $VER | cut -d. -f1)
              MINOR=$(echo $VER | cut -d. -f2)
              PATCH=$(echo $VER | cut -d. -f3 | cut -d- -f1)
              PATCH=$((PATCH + 1))
              VERSION="${MAJOR}.${MINOR}.${PATCH}"
            fi
          fi
          TAG="v${VERSION}-beta"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}, Tag: ${TAG}"

      - name: Stamp version in source
        run: |
          sed -i "s/const COMPILER_VERSION: str = \".*\"/const COMPILER_VERSION: str = \"${{ steps.version.outputs.version }}-beta\"/" src/main.aria
          grep COMPILER_VERSION src/main.aria

      - name: Build bootstrap compiler
        run: |
          cd aria-compiler-go
          go build -o ../bootstrap-aria ./cmd/aria

      - name: Build for all platforms
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          mkdir -p dist

          # The bootstrap transpiles Aria -> Go, then calls `go build`.
          # GOOS/GOARCH env vars propagate to the internal `go build` call,
          # enabling cross-compilation from a single runner.

          build_target() {
            local GOOS=$1 GOARCH=$2 LABEL=$3
            echo "=== Building aria-${TAG}-${LABEL} ==="
            rm -f main
            GOOS=$GOOS GOARCH=$GOARCH ./bootstrap-aria build \
              src/main.aria src/lexer/token.aria src/lexer/lexer.aria \
              src/parser/ast.aria src/parser/parser.aria src/parser/precedence.aria \
              src/resolver/scope.aria src/resolver/resolver.aria \
              src/checker/types.aria src/checker/traits.aria src/checker/checker.aria \
              src/codegen/ir.aria src/codegen/lower.aria src/codegen/llvm.aria \
              src/codegen/codegen.aria src/diagnostic/diagnostic.aria 2>&1
            if [ -f "main" ]; then
              mv main "dist/aria-${TAG}-${LABEL}"
              echo "  OK: dist/aria-${TAG}-${LABEL}"
            else
              echo "  FAILED: no output for ${LABEL}"
              return 1
            fi
          }

          build_target darwin  arm64 darwin-arm64
          build_target darwin  amd64 darwin-amd64
          build_target linux   amd64 linux-amd64
          build_target linux   arm64 linux-arm64
          build_target windows amd64 windows-amd64

          # Rename Windows binary to .exe
          if [ -f "dist/aria-${TAG}-windows-amd64" ]; then
            mv "dist/aria-${TAG}-windows-amd64" "dist/aria-${TAG}-windows-amd64.exe"
          fi

          echo ""
          echo "=== Release artifacts ==="
          ls -lh dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum aria-* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          # Create annotated tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

          # Build release notes
          cat > /tmp/release-notes.md << 'NOTES'
          ## Aria Compiler ${TAG}

          Self-hosting Aria compiler — compiles Aria source to native executables via LLVM IR.

          ### Quick Start

          ```bash
          # Download for your platform, then:
          chmod +x aria-*
          sudo mv aria-* /usr/local/bin/aria

          # Verify
          aria --version

          # Compile a program
          aria build hello.aria
          ./hello
          ```

          ### Prerequisites

          - **clang** — needed to compile generated LLVM IR to native code
            - macOS: `xcode-select --install`
            - Ubuntu/Debian: `sudo apt install clang`
            - Fedora: `sudo dnf install clang`

          ### Platform Binaries

          | File | OS | Architecture |
          |------|----|-------------|
          | `aria-${TAG}-darwin-arm64` | macOS | Apple Silicon (M1/M2/M3/M4) |
          | `aria-${TAG}-darwin-amd64` | macOS | Intel x86_64 |
          | `aria-${TAG}-linux-amd64` | Linux | x86_64 |
          | `aria-${TAG}-linux-arm64` | Linux | ARM64 / AArch64 |
          | `aria-${TAG}-windows-amd64.exe` | Windows | x86_64 |

          ### What's in This Release

          - Self-hosting compiler (compiles its own 27,000-line source)
          - 161 test programs, 156 pass single-file
          - Full language support: generics, traits, pattern matching, error handling, effects, closures, Map, Set, list comprehensions
          - LLVM IR backend targeting macOS and Linux
          NOTES

          # Substitute version into notes
          sed -i "s/\${TAG}/${TAG}/g" /tmp/release-notes.md

          # Create release
          PRERELEASE_FLAG=""
          if [ "${{ github.event.inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$TAG" \
            --title "Aria ${TAG}" \
            --notes-file /tmp/release-notes.md \
            $PRERELEASE_FLAG \
            dist/*
