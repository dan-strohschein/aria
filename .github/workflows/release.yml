name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.1.0). Leave empty to auto-increment patch.'
        required: false
        default: ''
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

env:
  # File order matters: diagnostic.aria must come before lexer.aria
  # to ensure correct struct field resolution (see _field_index_any)
  ARIA_SOURCES: >-
    src/main.aria
    src/diagnostic/diagnostic.aria
    src/lexer/token.aria
    src/lexer/lexer.aria
    src/parser/ast.aria
    src/parser/parser.aria
    src/parser/precedence.aria
    src/resolver/scope.aria
    src/resolver/resolver.aria
    src/checker/types.aria
    src/checker/traits.aria
    src/checker/checker.aria
    src/codegen/ir.aria
    src/codegen/lower.aria
    src/codegen/llvm.aria
    src/codegen/codegen.aria

jobs:
  build:
    timeout-minutes: 60
    strategy:
      matrix:
        include:
          - os: macos-15
            label: darwin-arm64
          - os: ubuntu-latest
            label: linux-amd64
          - os: windows-latest
            label: windows-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout bootstrap compiler
        uses: actions/checkout@v4
        with:
          repository: dan-strohschein/aria-compiler-go
          path: aria-compiler-go

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install clang (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Install clang (Windows)
        if: runner.os == 'Windows'
        run: choco install llvm -y

      - name: Build bootstrap compiler
        shell: bash
        run: |
          cd aria-compiler-go
          sed -i.bak 's/^go .*/go 1.23/' go.mod
          if [ "$RUNNER_OS" = "Windows" ]; then
            go build -o ../bootstrap-aria.exe ./cmd/aria
          else
            go build -o ../bootstrap-aria ./cmd/aria
          fi

      - name: Bootstrap → Gen0
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            export PATH="/c/Program Files/LLVM/bin:$PATH"
            ./bootstrap-aria.exe build ${{ env.ARIA_SOURCES }}
            mv main main.exe 2>/dev/null || true
          else
            ./bootstrap-aria build ${{ env.ARIA_SOURCES }}
          fi

      - name: Gen0 → Gen1 (self-compile)
        timeout-minutes: 20
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            export PATH="/c/Program Files/LLVM/bin:$PATH"
            ./main.exe build ${{ env.ARIA_SOURCES }}
            mv src/main src/main.exe 2>/dev/null || true
            cp src/main.exe gen1.exe
            echo "Gen1 built: $(wc -c < gen1.exe) bytes"
          else
            ./main build ${{ env.ARIA_SOURCES }}
            cp src/main gen1
            echo "Gen1 built: $(wc -c < gen1) bytes"
          fi

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          export PATH="/c/Program Files/LLVM/bin:$PATH"
          printf 'mod test\nentry {\n    println("hello from aria")\n}\n' > smoke_test.aria
          ./gen1.exe build smoke_test.aria
          mv smoke_test smoke_test.exe 2>/dev/null || true
          ./smoke_test.exe

      - name: Run test suite (Unix)
        if: runner.os != 'Windows'
        timeout-minutes: 10
        run: ARIA_COMPILER=./gen1 bash testdata/programs/run_tests.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aria-${{ matrix.label }}
          path: ${{ runner.os == 'Windows' && 'gen1.exe' || 'gen1' }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
            if [ -z "$LATEST" ]; then
              VERSION="0.1.0"
            else
              VER=${LATEST#v}
              MAJOR=$(echo $VER | cut -d. -f1)
              MINOR=$(echo $VER | cut -d. -f2)
              PATCH=$(echo $VER | cut -d. -f3 | cut -d- -f1)
              PATCH=$((PATCH + 1))
              VERSION="${MAJOR}.${MINOR}.${PATCH}"
            fi
          fi
          if [ "${{ github.event.inputs.prerelease }}" = "true" ]; then
            TAG="v${VERSION}-beta"
          else
            TAG="v${VERSION}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}, Tag: ${TAG}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release binaries
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          mkdir -p dist
          for dir in artifacts/aria-*; do
            label=$(basename "$dir" | sed 's/^aria-//')
            if [ -f "$dir/gen1.exe" ]; then
              dest="dist/aria-${TAG}-${label}.exe"
              cp "$dir/gen1.exe" "$dest"
              echo "Prepared: $dest ($(wc -c < "$dest") bytes)"
            elif [ -f "$dir/gen1" ]; then
              dest="dist/aria-${TAG}-${label}"
              cp "$dir/gen1" "$dest"
              chmod +x "$dest"
              echo "Prepared: $dest ($(wc -c < "$dest") bytes)"
            fi
          done
          cd dist && sha256sum aria-* > SHA256SUMS.txt && cat SHA256SUMS.txt

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

          PRERELEASE_FLAG=""
          if [ "${{ github.event.inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$TAG" \
            --title "Aria ${TAG}" \
            --notes "## Aria Compiler ${TAG}

          Self-hosting Aria compiler. Each binary was produced by the compiler compiling itself.

          ### Quick Start
          \`\`\`bash
          # macOS / Linux
          chmod +x aria-*
          sudo mv aria-* /usr/local/bin/aria
          aria build hello.aria && ./hello

          # Windows
          aria-v...-windows-amd64.exe build hello.aria
          hello.exe
          \`\`\`

          ### Requires
          - **clang** (macOS: xcode-select --install, Ubuntu: sudo apt install clang, Windows: choco install llvm)

          ### Binaries
          | File | Platform |
          |------|----------|
          | aria-${TAG}-darwin-arm64 | macOS Apple Silicon |
          | aria-${TAG}-linux-amd64 | Linux x86_64 |
          | aria-${TAG}-windows-amd64.exe | Windows x86_64 |" \
            $PRERELEASE_FLAG \
            dist/*
